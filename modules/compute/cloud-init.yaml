#cloud-config
# =============================================================================
# OpenClaw Provisioning on Ubuntu 24.04 LTS (Cloud-init)
# =============================================================================
# References:
#   - https://github.com/openclaw/openclaw/docs/install/
#   - https://github.com/openclaw/openclaw/docs/gateway/
#   - https://github.com/openclaw/openclaw/docs/gateway/security/

write_files:

  # ---------------------------------------------------------------------------
  # Script principal de provisionamento
  # ---------------------------------------------------------------------------
  - path: /opt/openclaw/provision.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      LOG_FILE="/var/log/openclaw-provision.log"
      exec > >(tee -a "$LOG_FILE") 2>&1

      log_info() {
        echo "[$(date -Iseconds)] [INFO] $*"
      }

      log_error() {
        echo "[$(date -Iseconds)] [ERROR] $*" >&2
      }

      log_info "=========================================="
      log_info "Starting OpenClaw Provisioning"
      log_info "=========================================="

      # =====================================================================
      # 1. System Updates
      # =====================================================================
      log_info "Stage 1: System Updates"
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get upgrade -y
      apt-get install -y curl git ca-certificates openssl

      # =====================================================================
      # 2. Create Dedicated Non-Root User
      # =====================================================================
      log_info "Stage 2: Creating openclaw user"
      if ! id openclaw &>/dev/null; then
        useradd -r -s /bin/false -d /var/lib/openclaw -m openclaw
        log_info "User 'openclaw' created"
      else
        log_info "User 'openclaw' already exists"
      fi

      # Set up directory structure
      mkdir -p /var/lib/openclaw/.openclaw
      mkdir -p /var/lib/openclaw/.config
      mkdir -p /var/lib/openclaw/.cache
      chown -R openclaw:openclaw /var/lib/openclaw
      chmod 700 /var/lib/openclaw/.openclaw
      chmod 700 /var/lib/openclaw/.config
      chmod 700 /var/lib/openclaw/.cache

      # =====================================================================
      # 3. Install Node.js 24.x LTS
      # =====================================================================
      log_info "Stage 3: Installing Node.js 24.x LTS"
      curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
      apt-get install -y nodejs
      log_info "Node.js version: $(node --version)"
      log_info "npm version: $(npm --version)"

      # =====================================================================
      # 4. Install OpenClaw via Official Installer
      # =====================================================================
      log_info "Stage 4: Installing OpenClaw"
      if ! command -v openclaw &>/dev/null; then
        curl -fsSL --proto '=https' --tlsv1.2 https://openclaw.ai/install.sh | bash
        log_info "OpenClaw installed"
      else
        log_info "OpenClaw already installed"
      fi

      # Verify installation
      if command -v openclaw &>/dev/null; then
        log_info "OpenClaw version: $(openclaw --version 2>/dev/null || echo 'installed')"
      else
        log_error "OpenClaw installation verification failed"
        exit 1
      fi

      # =====================================================================
      # 5. Generate Secure Authentication Token
      # =====================================================================
      log_info "Stage 5: Generating authentication token"
      OPENCLAW_TOKEN=$(openssl rand -base64 32)

      # FIX-1 + FIX-2: `echo` de uma linha evita heredoc com delimitador na
      # coluna 0 (que quebra YAML) e nao expoe o token no LOG_FILE.
      echo "OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_TOKEN}" > /var/lib/openclaw/.config/gateway.env

      chown openclaw:openclaw /var/lib/openclaw/.config/gateway.env
      chmod 600 /var/lib/openclaw/.config/gateway.env
      log_info "Token saved to /var/lib/openclaw/.config/gateway.env"

      # =====================================================================
      # 6. Inject Token into Gateway Configuration
      # =====================================================================
      log_info "Stage 6: Injecting token into gateway configuration"

      # FIX-4: O config.json foi pre-criado via write_files com um placeholder.
      # Aqui substituimos o placeholder pelo token gerado em runtime.
      # Isso evita heredoc sem aspas dentro do bloco YAML, cujo delimitador
      # na coluna 0 corromperia o parser (FIX-1), e resolve o problema do
      # heredoc com aspas simples que bloqueava a expansao da variavel (FIX-4).
      if [ -f /var/lib/openclaw/.openclaw/config.json ]; then
        sed -i "s|__TOKEN_PLACEHOLDER__|${OPENCLAW_TOKEN}|" \
          /var/lib/openclaw/.openclaw/config.json
        chown openclaw:openclaw /var/lib/openclaw/.openclaw/config.json
        chmod 600 /var/lib/openclaw/.openclaw/config.json
        log_info "Configuration file updated at /var/lib/openclaw/.openclaw/config.json"
      else
        log_error "config.json not found -- write_files may have failed"
        exit 1
      fi

      # =====================================================================
      # 7. Enable and Start Systemd Service
      # =====================================================================
      log_info "Stage 7: Enabling and starting service"
      systemctl daemon-reload
      systemctl enable openclaw-gateway.service
      systemctl start openclaw-gateway.service

      # Wait for service to stabilize
      sleep 3

      if systemctl is-active --quiet openclaw-gateway.service; then
        log_info "OpenClaw gateway service is running"
      else
        log_error "OpenClaw gateway service failed to start"
        systemctl status openclaw-gateway.service || true
        journalctl -u openclaw-gateway.service -n 20 || true
      fi

      # =====================================================================
      # 8. Configure UFW Firewall
      # =====================================================================
      log_info "Stage 8: Configuring firewall"
      ufw allow 22/tcp comment "SSH"
      ufw allow 443/tcp comment "HTTPS"
      ufw allow 18789/tcp comment "OpenClaw Gateway"
      ufw --force enable

      log_info "Firewall rules:"
      ufw status verbose

      # =====================================================================
      # 9. Verification and Logging
      # =====================================================================
      log_info "Stage 9: Verification"

      # Check service user
      SERVICE_USER=$(systemctl show -p User --value openclaw-gateway.service)
      if [ "$SERVICE_USER" = "openclaw" ]; then
        log_info "Service running as non-root user: $SERVICE_USER"
      else
        log_error "Service not running as openclaw user"
      fi

      # Check config file permissions
      if [ -f /var/lib/openclaw/.openclaw/config.json ]; then
        CONFIG_PERMS=$(stat -c %a /var/lib/openclaw/.openclaw/config.json)
        log_info "Config file permissions: $CONFIG_PERMS"
      fi

      # Check env file permissions
      if [ -f /var/lib/openclaw/.config/gateway.env ]; then
        ENV_PERMS=$(stat -c %a /var/lib/openclaw/.config/gateway.env)
        log_info "Environment file permissions: $ENV_PERMS"
      fi

      # Verifica que o placeholder foi substituido (token nao pode ser literal)
      if grep -q "__TOKEN_PLACEHOLDER__" /var/lib/openclaw/.openclaw/config.json 2>/dev/null; then
        log_error "Token placeholder was NOT replaced in config.json"
        exit 1
      else
        log_info "Token placeholder successfully replaced in config.json"
      fi

      # FIX-3: Token NUNCA deve ser impresso no log.
      # O original imprimia o valor bruto via subshell no Stage 10.
      # Substituido por instrucao de recuperacao segura sem expor o valor.
      log_info ""
      log_info "=========================================="
      log_info "IMPORTANT: Authentication Token"
      log_info "=========================================="
      log_info "Token saved in: /var/lib/openclaw/.config/gateway.env"
      log_info "Retrieve with (root only):"
      log_info "  grep OPENCLAW_GATEWAY_TOKEN /var/lib/openclaw/.config/gateway.env"
      log_info ""
      log_info "For GitHub Secrets:"
      log_info "  Secret name : OPENCLAW_AUTH_TOKEN"
      log_info "  Secret value: see file above (do not paste in logs)"
      log_info ""
      log_info "Service status: $(systemctl is-active openclaw-gateway.service)"
      log_info "Service logs:   journalctl -u openclaw-gateway.service -f"
      log_info "=========================================="
      log_info "OpenClaw Provisioning Complete"
      log_info "=========================================="

  # ---------------------------------------------------------------------------
  # Gateway configuration (token sera injetado via sed no provision.sh)
  # FIX-1/FIX-4: Arquivo estatico em write_files evita heredoc na coluna 0
  # e o problema de <<'CONFIG_EOF' que bloqueava expansao de variavel.
  # ---------------------------------------------------------------------------
  - path: /var/lib/openclaw/.openclaw/config.json
    permissions: "0600"
    content: |
      {
        "gateway": {
          "mode": "local",
          "bind": "0.0.0.0",
          "port": 18789,
          "auth": {
            "mode": "token",
            "token": "__TOKEN_PLACEHOLDER__"
          }
        },
        "session": {
          "dmScope": "per-channel-peer"
        },
        "tools": {
          "profile": "messaging",
          "deny": [
            "group:automation",
            "group:runtime",
            "group:fs",
            "sessions_spawn",
            "sessions_send"
          ],
          "exec": {
            "security": "deny",
            "ask": "always"
          },
          "elevated": {
            "enabled": false
          }
        },
        "plugins": {
          "enabled": true
        }
      }

  # ---------------------------------------------------------------------------
  # Systemd service unit
  # FIX-1: Arquivo estatico em write_files evita heredoc com SERVICE_EOF
  # na coluna 0 que corromperia o parser YAML.
  # FIX-5: Adicionado ProtectHome=true (estava ausente no original).
  # ---------------------------------------------------------------------------
  - path: /etc/systemd/system/openclaw-gateway.service
    permissions: "0644"
    content: |
      [Unit]
      Description=OpenClaw AI Gateway
      Documentation=https://github.com/openclaw/openclaw
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=openclaw
      Group=openclaw
      WorkingDirectory=/var/lib/openclaw

      ExecStart=/usr/local/bin/openclaw gateway --port 18789

      Restart=always
      RestartSec=5
      TimeoutStartSec=90
      TimeoutStopSec=30

      EnvironmentFile=/var/lib/openclaw/.config/gateway.env
      Environment=NODE_ENV=production
      Environment=HOME=/var/lib/openclaw
      Environment=NODE_COMPILE_CACHE=/var/lib/openclaw/.cache

      StandardOutput=journal
      StandardError=journal
      SyslogIdentifier=openclaw-gateway

      # Security hardening
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectSystem=strict
      ProtectHome=true
      ReadWritePaths=/var/lib/openclaw /tmp

      [Install]
      WantedBy=multi-user.target

runcmd:
  - |
    MAX_RETRIES=3
    RETRY_DELAY=15
    for attempt in $(seq 1 $MAX_RETRIES); do
      echo "Provisioning attempt $attempt/$MAX_RETRIES..."
      if bash /opt/openclaw/provision.sh; then
        echo "Provisioning completed successfully"
        exit 0
      else
        if [ $attempt -lt $MAX_RETRIES ]; then
          echo "Provisioning failed, retrying in ${RETRY_DELAY}s..."
          sleep $RETRY_DELAY
        else
          echo "Provisioning failed after $MAX_RETRIES attempts"
          exit 1
        fi
      fi
    done