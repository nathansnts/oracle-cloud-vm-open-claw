###############################################################################
# .github/workflows/infra-destroy.yml
# CI/CD Pipeline — Destroy OCI Infrastructure
#
# SAFETY: Manual-only trigger with typed confirmation gate.
###############################################################################

name: "Infrastructure — Destroy"

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm infrastructure teardown"
        required: true
        type: string

permissions:
  contents: read

env:
  TF_VERSION: "1.14.9"
  TF_WORKING_DIR: "environments/production"

  # OCI provider auth
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_CLI_TENANCY }}
  TF_VAR_user_ocid: ${{ secrets.OCI_CLI_USER }}
  TF_VAR_fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
  TF_VAR_private_key: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  TF_VAR_region: ${{ secrets.OCI_CLI_REGION }}

  # Infrastructure variables
  TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_allowed_cidr: ${{ secrets.ALLOWED_CIDR }}

jobs:
  # =========================================================================
  # Stage 1: Validate Confirmation Input
  # =========================================================================
  validate-input:
    name: "Validate Confirmation"
    runs-on: ubuntu-latest

    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "::error::Confirmation failed. You must type exactly 'DESTROY' to proceed."
            exit 1
          fi
          echo "✅ Confirmation received. Proceeding with destruction."

  # =========================================================================
  # Stage 2: Destroy (requires environment approval)
  # =========================================================================
  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    needs: validate-input

    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure OCI S3-compatible backend credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.OCI_CLI_USER }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.OCI_CLI_FINGERPRINT }}" >> "$GITHUB_ENV"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.OCI_BUCKET_NAME }}" \
            -backend-config="region=${{ secrets.OCI_CLI_REGION }}"

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve -input=false
