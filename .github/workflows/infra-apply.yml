###############################################################################
# .github/workflows/infra-apply.yml
# CI/CD Pipeline — Create or Update OCI Infrastructure
#
# Flow: Checkout → Setup → Lint → Validate → Security Scan → Plan → Approve → Apply
###############################################################################

name: "Infrastructure — Apply"

on:
  push:
    branches: [main]
    paths:
      - "modules/**"
      - "environments/production/**"
      - ".github/workflows/infra-apply.yml"
  pull_request:
    branches: [main]
    paths:
      - "modules/**"
      - "environments/production/**"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "~> 1.14.0"
  TF_WORKING_DIR: "environments/production"

  # OCI provider auth (from repository secrets)
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_CLI_TENANCY }}
  TF_VAR_user_ocid: ${{ secrets.OCI_CLI_USER }}
  TF_VAR_fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
  TF_VAR_private_key: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  TF_VAR_region: ${{ secrets.OCI_CLI_REGION }}

  # Infrastructure variables
  TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_allowed_cidr: ${{ secrets.ALLOWED_CIDR }}

jobs:
  # =========================================================================
  # Stage 1: Lint, Validate, and Security Scan
  # =========================================================================
  lint-and-scan:
    name: "Lint · Validate · Security Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive -diff

      - name: Terraform Init (backend disabled for validation)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Install tfsec
        run: |
          curl -sL https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 \
            -o /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec

      - name: Run tfsec (SAST)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tfsec . --format json --out tfsec-results.json --soft-fail
        # soft-fail allows the pipeline to continue; review results in artifacts.

      - name: Upload tfsec Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-results
          path: ${{ env.TF_WORKING_DIR }}/tfsec-results.json
          retention-days: 30

  # =========================================================================
  # Stage 2: Plan
  # =========================================================================
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: lint-and-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure OCI S3-compatible backend credentials
        run: |
          # OCI Object Storage uses S3-compatible API for Terraform backend.
          echo "AWS_ACCESS_KEY_ID=${{ secrets.OCI_CLI_USER }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.OCI_CLI_FINGERPRINT }}" >> "$GITHUB_ENV"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.OCI_BUCKET_NAME }}" \
            -backend-config="region=${{ secrets.OCI_CLI_REGION }}"

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan -input=false

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 5

  # =========================================================================
  # Stage 3: Apply (requires manual approval)
  # =========================================================================
  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Configure OCI S3-compatible backend credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.OCI_CLI_USER }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.OCI_CLI_FINGERPRINT }}" >> "$GITHUB_ENV"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.OCI_BUCKET_NAME }}" \
            -backend-config="region=${{ secrets.OCI_CLI_REGION }}"

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Export Terraform Outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform output -json > ../outputs.json

      - name: Upload Terraform Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: outputs.json
          retention-days: 5

  # =========================================================================
  # Stage 4: Validate OpenClaw Deployment
  # =========================================================================
  validate:
    name: "Validate OpenClaw Deployment"
    runs-on: ubuntu-latest
    needs: apply
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Terraform Outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-outputs
          path: .

      - name: Extract Instance IP
        id: extract_ip
        run: |
          INSTANCE_IP=$(jq -r '.instance_public_ip.value' outputs.json)
          echo "instance_ip=${INSTANCE_IP}" >> "$GITHUB_OUTPUT"
          echo "Instance IP: ${INSTANCE_IP}"

      - name: Setup SSH Key
        run: |
          # Create temporary SSH key file
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/openclaw_key
          chmod 600 ~/.ssh/openclaw_key
          # Add host key verification bypass
          ssh-keyscan -H "${{ steps.extract_ip.outputs.instance_ip }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Make Validation Script Executable
        run: chmod +x scripts/validate-openclaw.sh

      - name: Validate OpenClaw Installation
        run: |
          ./scripts/validate-openclaw.sh \
            "${{ steps.extract_ip.outputs.instance_ip }}" \
            ~/.ssh/openclaw_key \
            300  # 5 minute timeout
        continue-on-error: true  # Don't fail pipeline if validation has warnings

      - name: Cleanup SSH Key
        if: always()
        run: |
          rm -f ~/.ssh/openclaw_key
          rm -f ~/.ssh/known_hosts
