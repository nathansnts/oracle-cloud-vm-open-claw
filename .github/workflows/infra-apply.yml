# Flow: Lint → Validate → SAST → Plan → Approve → Apply → Validate
###############################################################################

name: "Infrastructure — Apply"

on:
  push:
    branches: [ main ]
    paths:
      - "modules/**"
      - "environments/production/**"
      - ".github/workflows/infra-apply.yml"
  pull_request:
    branches: [ main ]
    paths: [ "modules/**", "environments/production/**" ]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: ${{ vars.TF_VERSION }}
  TF_OCI_VCN_CIDR: ${{ vars.TF_OCI_VCN_CIDR }}
  TF_OCI_SUBNET_CIDR: ${{ var.TF_OCI_SUBNET_CIDR }}
  TF_WORKING_DIR: "environments/production"
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_CLI_TENANCY }}
  TF_VAR_user_ocid: ${{ secrets.OCI_CLI_USER }}
  TF_VAR_fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
  TF_VAR_private_key: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  TF_VAR_region: ${{ secrets.OCI_CLI_REGION }}
  TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_allowed_cidr: ${{ secrets.OCI_ALLOWED_CIDR }}
  TF_VAR_availability_domain: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}

# ---------------------------------------------------------------------------
# Reusable steps via composite action (avoids duplicating credential setup)
# ---------------------------------------------------------------------------

jobs:
  # =========================================================================
  # Stage 1 — Lint, Validate, Security Scan
  # =========================================================================
  lint-and-scan:
    name: "Lint · Validate · SAST"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init (no backend)
        run: terraform init -backend=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Run tfsec (SAST)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ${{ env.TF_WORKING_DIR }}
          soft_fail: true
          format: json
          additional_args: --out tfsec-results.json

      - name: Upload tfsec results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-results
          path: ${{ env.TF_WORKING_DIR }}/tfsec-results.json
          retention-days: 30

  # =========================================================================
  # Stage 2 — Plan
  # =========================================================================
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: lint-and-scan

    steps:
      - uses: actions/checkout@v4

      - name: Configure OCI credentials
        shell: bash
        run: |
          mkdir -p /home/runner/.oci

          # Write PEM key
          printf '%s\n' "$TF_VAR_private_key" \
            > /home/runner/.oci/oci_api_key.pem
          chmod 600 /home/runner/.oci/oci_api_key.pem

          # Write config using tee to avoid heredoc issues with pipefail
          {
            echo "[DEFAULT]"
            echo "user=${TF_VAR_user_ocid}"
            echo "tenancy=${TF_VAR_tenancy_ocid}"
            echo "fingerprint=${TF_VAR_fingerprint}"
            echo "region=${TF_VAR_region}"
            echo "key_file=/home/runner/.oci/oci_api_key.pem"
          } > /home/runner/.oci/config

          chmod 600 /home/runner/.oci/config

          # Verify profile exists
          grep -q "\[DEFAULT\]" /home/runner/.oci/config \
            || { echo "ERROR: [DEFAULT] profile missing"; exit 1; }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 5

  # =========================================================================
  # Stage 3 — Apply (requires manual approval via GitHub Environment)
  # =========================================================================
  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure OCI credentials
        shell: bash
        run: |
          mkdir -p /home/runner/.oci

          # Write PEM key
          printf '%s\n' "$TF_VAR_private_key" \
            > /home/runner/.oci/oci_api_key.pem
          chmod 600 /home/runner/.oci/oci_api_key.pem

          # Write config using tee to avoid heredoc issues with pipefail
          {
            echo "[DEFAULT]"
            echo "user=${TF_VAR_user_ocid}"
            echo "tenancy=${TF_VAR_tenancy_ocid}"
            echo "fingerprint=${TF_VAR_fingerprint}"
            echo "region=${TF_VAR_region}"
            echo "key_file=/home/runner/.oci/oci_api_key.pem"
          } > /home/runner/.oci/config

          chmod 600 /home/runner/.oci/config

          # Verify profile exists
          grep -q "\[DEFAULT\]" /home/runner/.oci/config \
            || { echo "ERROR: [DEFAULT] profile missing"; exit 1; }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Export and upload Terraform outputs
        run: terraform output -json > ../../outputs.json
        working-directory: ${{ env.TF_WORKING_DIR }}

      - uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: outputs.json
          retention-days: 5

  # =========================================================================
  # Stage 4 — Validate OpenClaw via SSH
  # =========================================================================
  validate:
    name: "Validate OpenClaw"
    runs-on: ubuntu-latest
    needs: apply
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Download Terraform outputs
        uses: actions/download-artifact@v4
        with:
          name: terraform-outputs
          path: .

      - name: Setup SSH and validate
        run: |
          INSTANCE_IP=$(jq -r '.instance_public_ip.value' outputs.json)
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/openclaw_key
          chmod 600 ~/.ssh/openclaw_key
          ssh-keyscan -H "${INSTANCE_IP}" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod +x scripts/validate-openclaw.sh
          ./scripts/validate-openclaw.sh "${INSTANCE_IP}" ~/.ssh/openclaw_key 300
        continue-on-error: true

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/openclaw_key ~/.ssh/known_hosts